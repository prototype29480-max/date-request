<!DOCTYPE html>
<html lang="fr">
<head>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("6R7xoDIyXGICVSVRC");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Request ❤️</title>
<style>
  #dr-root {
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    font-family: var(--font-sans);
    box-sizing: border-box;
  }
  *, *::before, *::after { box-sizing: border-box; }
  #dr-stage { text-align: center; width: 100%; max-width: 560px; animation: drFade 0.5s ease; }
  @keyframes drFade { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .dr-title { font-size: clamp(18px, 4vw, 22px); font-weight: 500; color: var(--text-primary); margin: 0 0 0.5rem; }
  .dr-sub { font-size: clamp(14px, 3vw, 16px); color: var(--text-secondary); margin: 0 0 1.5rem; }
  .dr-btn-yes {
    padding: 12px 24px; font-size: clamp(0.9rem, 3vw, 1rem); font-weight: 500;
    border-radius: 30px; border: none; cursor: pointer;
    background: #d4537e; color: #fff; margin: 8px; transition: transform 0.2s;
  }
  .dr-btn-yes:hover { transform: scale(1.08); }
  .dr-btn-no-static {
    padding: 12px 24px; font-size: clamp(0.9rem, 3vw, 1rem); font-weight: 500;
    border-radius: 30px; border: none; cursor: pointer;
    background: var(--surface-1); color: var(--text-secondary);
    border: 0.5px solid var(--border-strong); margin: 8px;
  }
  .dr-btn-no-flying {
    padding: 12px 24px; font-size: 1rem; font-weight: 500;
    border-radius: 30px; border: none; cursor: pointer;
    background: var(--surface-1); color: var(--text-secondary);
    border: 0.5px solid var(--border-strong);
    position: fixed; transition: left 0.15s ease, top 0.15s ease;
    z-index: 999;
  }
  .dr-heart { font-size: clamp(2rem, 6vw, 2.5rem); display: block; margin-bottom: 1rem; }
  .dr-confirm-btn {
    display: block; margin: 1.25rem auto 0; padding: 12px 28px;
    font-size: clamp(0.9rem, 3vw, 1rem); font-weight: 500;
    border-radius: 30px; border: none; cursor: pointer; background: #d4537e; color: #fff;
    transition: transform 0.2s;
  }
  .dr-confirm-btn:hover { transform: scale(1.05); }
  .dr-confirm-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
  .dr-status { font-size: 14px; color: var(--text-secondary); margin-top: 1rem; min-height: 1.5rem; }
  .dr-badge {
    display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 13px;
    background: var(--bg-accent); color: var(--text-accent); margin-bottom: 1rem;
  }
  .dr-cards-wrap { position: relative; margin-top: 1.5rem; }
  .dr-card {
    padding: 0.9rem 0.5rem; background: var(--surface-2);
    border: 0.5px solid var(--border); border-radius: 12px; cursor: pointer;
    font-size: clamp(1.3rem, 4vw, 1.6rem); text-align: center; position: absolute;
    transition: left 0.15s ease, top 0.15s ease;
  }
  .dr-card p { font-size: clamp(10px, 2vw, 12px); color: var(--text-secondary); margin: 5px 0 0; }
  .dr-card-fixed {
    padding: 0.9rem 0.5rem; background: var(--surface-2);
    border: 2px solid var(--border-accent); border-radius: 12px; cursor: pointer;
    font-size: clamp(1.3rem, 4vw, 1.6rem); text-align: center; position: absolute;
    transition: transform 0.2s;
  }
  .dr-card-fixed:hover { transform: scale(1.06); }
  .dr-card-fixed p { font-size: clamp(10px, 2vw, 12px); color: var(--text-accent); margin: 5px 0 0; font-weight: 500; }
  input[type="date"], input[type="email"] { width: min(240px, 90%); }
</style>

<div id="dr-root"><div id="dr-stage"></div></div>

<script>
(function() {
  const stage = document.getElementById('dr-stage');
  let selectedDate = '';
  let noCount = 0;
  let flyingBtn = null;

  function render(html) {
    if (flyingBtn) { flyingBtn.remove(); flyingBtn = null; }
    stage.style.animation = 'none';
    stage.offsetHeight;
    stage.style.animation = 'drFade 0.5s ease';
    stage.innerHTML = html;
  }

  function step1() {
    render(`
      <h1 class="dr-title">Coucou mon coeur ❤️, wanna hangout for our world's best day ❤️?</h1>
      <p class="dr-sub">Réponds honnêtement 🥺</p>
      <div>
        <button class="dr-btn-yes" id="drYes">Oui 💕</button>
        <button class="dr-btn-no-static" id="drNo">Non 🤯</button>
      </div>
      <p class="dr-status" id="drNoHint"></p>
    `);
    document.getElementById('drYes').onclick = step2;
    const msgs = ['Vraiment ? 😅','Tu es sûr(e) ? 🥺','Reconsidère... 💭','Dernière chance ! 🙈'];
    document.getElementById('drNo').onclick = function() {
      noCount++;
      const hint = document.getElementById('drNoHint');
      if (noCount <= 4) {
        hint.textContent = msgs[noCount - 1];
        if (noCount === 4) this.textContent = 'Non... 😭';
      } else if (noCount === 5) {
        hint.textContent = 'Attrape-moi si tu peux 😏';
        makeFly(this);
      }
    };
  }

  function makeFly(btn) {
    const rect = btn.getBoundingClientRect();
    btn.classList.remove('dr-btn-no-static');
    btn.style.left = rect.left + 'px';
    btn.style.top = rect.top + 'px';
    btn.style.width = rect.width + 'px';
    btn.classList.add('dr-btn-no-flying');
    document.body.appendChild(btn);
    flyingBtn = btn;
    btn.addEventListener('mouseenter', function() {
      const maxX = window.innerWidth - btn.offsetWidth - 10;
      const maxY = window.innerHeight - btn.offsetHeight - 10;
      let nx, ny;
      do {
        nx = 10 + Math.random() * maxX;
        ny = 10 + Math.random() * maxY;
      } while (Math.abs(nx - parseFloat(btn.style.left)) < 80 && Math.abs(ny - parseFloat(btn.style.top)) < 80);
      btn.style.left = nx + 'px';
      btn.style.top = ny + 'px';
    });
  }

  function step2() {
    render(`
      <span class="dr-heart">📅</span>
      <h1 class="dr-title">Choisis une date pour notre diner en amoureux 🥺</h1>
      <p class="dr-sub">Quand es-tu disponible ?</p>
      <input type="date" id="drDate">
      <button class="dr-confirm-btn" id="drDateBtn">Continuer ❤️</button>
    `);
    document.getElementById('drDateBtn').onclick = function() {
      const val = document.getElementById('drDate').value;
      if (!val) { alert('Choisis une date pour notre diner en amoureux 🥺'); return; }
      selectedDate = val;
      step3();
    };
  }

  function step3() {
    const dateStr = new Date(selectedDate + 'T12:00:00').toLocaleDateString('fr-FR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    render(`
      <span class="dr-heart">✨</span>
      <h1 class="dr-title">Parfait mon ange 💕</h1>
      <div class="dr-badge">${dateStr}</div>
      <p class="dr-sub">Que veux-tu pour ton anniversaire ?</p>
      <div class="dr-cards-wrap" id="drCardsWrap"></div>
    `);

    const wrap = document.getElementById('drCardsWrap');
    const isMobile = window.innerWidth < 480;
    const cardW = isMobile ? Math.floor((wrap.offsetWidth - 40) / 2) : Math.floor((wrap.offsetWidth - 50) / 4);
    const cardH = isMobile ? 100 : 120;
    const gap = 10;
    const wrapH = isMobile ? cardH * 2 + gap * 3 : cardH + gap * 2;
    wrap.style.height = wrapH + 'px';

    const positions = isMobile
      ? [
          { left: gap, top: gap },
          { left: cardW + gap * 2, top: gap },
          { left: gap, top: cardH + gap * 2 },
          { left: cardW + gap * 2, top: cardH + gap * 2 }
        ]
      : [
          { left: gap, top: gap },
          { left: cardW + gap * 2, top: gap },
          { left: (cardW + gap) * 2 + gap, top: gap },
          { left: (cardW + gap) * 3 + gap, top: gap }
        ];

    const cards = [
      { id: 'dc1', emoji: '&#128536', label: 'Moi', fixed: false },
      { id: 'dc2', emoji: '&#127908', label: 'Un concert de Rilès', fixed: false },
      { id: 'dc3', emoji: '&#128214', label: 'Un livre tout mimi', fixed: false },
      { id: 'dc4', emoji: '&#128523', label: 'Les trois !', fixed: true },
    ];

    cards.forEach((c, i) => {
      const el = document.createElement('div');
      el.id = c.id;
      el.className = c.fixed ? 'dr-card-fixed' : 'dr-card';
      el.style.left = positions[i].left + 'px';
      el.style.top = positions[i].top + 'px';
      el.style.width = cardW + 'px';
      el.innerHTML = `${c.emoji}<p>${c.label}</p>`;
      wrap.appendChild(el);

      if (!c.fixed) {
        el.addEventListener('mouseenter', function() {
          const maxX = wrap.offsetWidth - cardW - gap;
          const maxY = wrap.offsetHeight - cardH - gap;
          let nx, ny, tries = 0;
          do {
            nx = gap + Math.random() * maxX;
            ny = gap + Math.random() * maxY;
            tries++;
          } while (tries < 20 && Math.abs(nx - parseFloat(el.style.left)) < 40 && Math.abs(ny - parseFloat(el.style.top)) < 40);
          el.style.left = nx + 'px';
          el.style.top = ny + 'px';
        });
      } else {
        el.onclick = () => step4('Les trois &#128523');
      }
    });
  }

  function step4(choice) {
    const dateStr = new Date(selectedDate + 'T12:00:00').toLocaleDateString('fr-FR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    render(`
      <span class="dr-heart">🥰</span>
      <h1 class="dr-title">C'est une date !</h1>
      <div class="dr-badge">${choice} — ${dateStr}</div>
      <p class="dr-sub">Entre ton adresse mail pour recevoir la confirmation 💌</p>
      <input type="email" id="drEmail" placeholder="ton@email.com">
      <button class="dr-confirm-btn" id="drSend">Envoyer ❤️</button>
      <p class="dr-status" id="drSendStatus"></p>
    `);
    document.getElementById('drSend').onclick = function() {
      const email = document.getElementById('drEmail').value.trim();
      const status = document.getElementById('drSendStatus');
      if (!email || !email.includes('@')) { status.textContent = 'Entre une adresse valide.'; return; }
      status.textContent = 'Envoi en cours... 💌';
      document.getElementById('drSend').disabled = true;
      if (typeof emailjs !== 'undefined') {
        emailjs.send("service_mylove", "template_h1cmitq", {
          to_email: email, reply_to: email, date: dateStr, activity: choice
        }).then(() => {
          status.textContent = 'Confirmation envoyée à ' + email + ' !';
        }).catch(() => {
          status.textContent = 'Erreur lors de l\'envoi — vérifie tes clés EmailJS.';
          document.getElementById('drSend').disabled = false;
        });
      } else {
        status.textContent = 'EmailJS non chargé — ajoute le script dans ta page.';
        document.getElementById('drSend').disabled = false;
      }
    };
  }

  step1();
})();
</script>
