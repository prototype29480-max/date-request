<!DOCTYPE html>
<html lang="fr">
<head>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init("6R7xoDIyXGICVSVRC");</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Request ❤️</title>
<style>
  @keyframes gradShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes drFade {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.15); }
  }
  #dr-shell {
    min-height: 480px; width: 100%;
    background: linear-gradient(135deg, #0d0d14, #1a0a2e, #0d1a2e, #160a1f, #0a0d1a);
    background-size: 400% 400%;
    animation: gradShift 10s ease infinite;
    display: flex; align-items: center; justify-content: center;
    border-radius: 16px; padding: 2rem 1rem; box-sizing: border-box;
    position: relative; overflow: hidden;
  }
  #dr-shell::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(180,80,220,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 70%, rgba(80,120,255,0.07) 0%, transparent 55%);
    pointer-events: none;
  }
  #dr-stage {
    text-align: center; width: 100%; max-width: 540px;
    animation: drFade 0.55s ease; position: relative; z-index: 1;
  }
  .dr-heart { font-size: 2.4rem; display: block; margin-bottom: 0.9rem; animation: pulse 2.5s ease-in-out infinite; }
  .dr-title { font-size: clamp(17px, 3.5vw, 21px); font-weight: 500; color: #f0eaf8; margin: 0 0 0.5rem; letter-spacing: 0.01em; }
  .dr-sub { font-size: clamp(13px, 2.5vw, 15px); color: rgba(220,200,255,0.55); margin: 0 0 1.6rem; }

  .dr-btn-yes {
    padding: 12px 32px; font-size: clamp(0.85rem, 2.5vw, 0.95rem); font-weight: 600;
    border-radius: 30px; border: none; cursor: pointer;
    background: #ffffff; color: #7c3aed;
    margin: 8px; letter-spacing: 0.02em;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(255,255,255,0.35), 0 4px 16px rgba(0,0,0,0.3);
  }
  .dr-btn-yes:hover { transform: scale(1.07); box-shadow: 0 0 36px rgba(255,255,255,0.5), 0 4px 20px rgba(0,0,0,0.4); }

  .dr-btn-no-static {
    padding: 12px 32px; font-size: clamp(0.85rem, 2.5vw, 0.95rem); font-weight: 600;
    border-radius: 30px; border: none; cursor: pointer;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75);
    margin: 8px;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 12px rgba(255,255,255,0.1), 0 4px 12px rgba(0,0,0,0.3);
  }
  .dr-btn-no-static:hover { background: rgba(255,255,255,0.18); box-shadow: 0 0 20px rgba(255,255,255,0.2); }

  .dr-btn-no-flying {
    padding: 12px 32px; font-size: 0.95rem; font-weight: 600;
    border-radius: 30px; border: none; cursor: pointer;
    background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.75);
    position: fixed; transition: left 0.12s ease, top 0.12s ease;
    z-index: 9999; backdrop-filter: blur(6px);
  }

  .dr-status { font-size: 13px; color: rgba(200,160,255,0.7); margin-top: 0.8rem; min-height: 1.4rem; }
  .dr-badge {
    display: inline-block; padding: 4px 16px; border-radius: 20px; font-size: 12px;
    letter-spacing: 0.03em; background: rgba(160,80,255,0.15); color: rgba(210,170,255,0.85);
    border: 0.5px solid rgba(180,100,255,0.25); margin-bottom: 1.1rem;
  }

  .dr-confirm-btn {
    display: block; margin: 1.2rem auto 0; padding: 12px 32px;
    font-size: clamp(0.85rem, 2.5vw, 0.95rem); font-weight: 600;
    border-radius: 30px; border: none; cursor: pointer;
    background: #ffffff; color: #7c3aed;
    letter-spacing: 0.02em;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(255,255,255,0.35), 0 4px 16px rgba(0,0,0,0.3);
  }
  .dr-confirm-btn:hover { transform: scale(1.05); box-shadow: 0 0 36px rgba(255,255,255,0.5); }
  .dr-confirm-btn:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }

  .dr-cards-wrap { position: relative; margin-top: 1.4rem; }
  .dr-card {
    padding: 0.9rem 0.5rem; background: rgba(255,255,255,0.06);
    border: 0.5px solid rgba(255,255,255,0.12); border-radius: 12px; cursor: pointer;
    font-size: clamp(1.3rem, 4vw, 1.6rem); text-align: center; position: absolute;
    transition: left 0.15s ease, top 0.15s ease, border-color 0.2s; color: #f0eaf8;
  }
  .dr-card:hover { border-color: rgba(255,255,255,0.3); }
  .dr-card p { font-size: clamp(10px, 2vw, 12px); color: rgba(220,200,255,0.5); margin: 5px 0 0; }

  .dr-card-fixed {
    padding: 0.9rem 0.5rem; background: #ffffff;
    border: none; border-radius: 12px; cursor: pointer;
    font-size: clamp(1.3rem, 4vw, 1.6rem); text-align: center; position: absolute;
    transition: transform 0.2s, box-shadow 0.2s; color: #f0eaf8;
    box-shadow: 0 0 24px rgba(255,255,255,0.4), 0 4px 16px rgba(0,0,0,0.3);
  }
  .dr-card-fixed:hover { transform: scale(1.07); box-shadow: 0 0 36px rgba(255,255,255,0.6); }
  .dr-card-fixed p { font-size: clamp(10px, 2vw, 12px); color: #7c3aed; margin: 5px 0 0; font-weight: 600; }

  input[type="date"], input[type="email"] {
    width: min(260px, 90%); padding: 10px 14px; font-size: 0.95rem;
    border-radius: 10px; border: 0.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08); color: #f0eaf8; margin-top: 0.5rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="date"]:focus, input[type="email"]:focus {
    border-color: rgba(255,255,255,0.4);
    box-shadow: 0 0 12px rgba(255,255,255,0.15);
  }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); }
</style>

<div id="dr-shell"><div id="dr-stage"></div></div>

<script>
(function() {
  const stage = document.getElementById('dr-stage');
  let selectedDate = '';
  let noCount = 0;
  let flyingBtn = null;

  function render(html) {
    if (flyingBtn) { flyingBtn.remove(); flyingBtn = null; }
    stage.style.animation = 'none';
    stage.offsetHeight;
    stage.style.animation = 'drFade 0.55s ease';
    stage.innerHTML = html;
  }

  function step1() {
    render(`
      <h1 class="dr-title">Coucou mon coeur, wanna hangout for our world's best day ❤️?</h1>
      <p class="dr-sub">Réponds honnêtement 🥺</p>
      <div>
        <button class="dr-btn-yes" id="drYes">Oui 💕</button>
        <button class="dr-btn-no-static" id="drNo">Non 🤯</button>
      </div>
      <p class="dr-status" id="drNoHint"></p>
    `);
    document.getElementById('drYes').onclick = step2;
    const msgs = ['Vraiment ? 😅','Tu es sûr(e) ? 🥺','Reconsidère... 💭','Dernière chance ! 🙈'];
    document.getElementById('drNo').onclick = function() {
      noCount++;
      const hint = document.getElementById('drNoHint');
      if (noCount <= 4) {
        hint.textContent = msgs[noCount - 1];
        if (noCount === 4) this.textContent = 'Non... 😭';
      } else if (noCount === 5) {
        hint.textContent = 'Attrape-moi si tu peux 😏';
        makeFly(this);
      }
    };
  }

  function makeFly(btn) {
    const rect = btn.getBoundingClientRect();
    btn.classList.remove('dr-btn-no-static');
    btn.style.left = rect.left + 'px';
    btn.style.top = rect.top + 'px';
    btn.style.width = rect.width + 'px';
    btn.classList.add('dr-btn-no-flying');
    document.body.appendChild(btn);
    flyingBtn = btn;
    btn.addEventListener('mouseenter', function() {
      const maxX = window.innerWidth - btn.offsetWidth - 10;
      const maxY = window.innerHeight - btn.offsetHeight - 10;
      let nx, ny;
      do {
        nx = 10 + Math.random() * maxX;
        ny = 10 + Math.random() * maxY;
      } while (Math.abs(nx - parseFloat(btn.style.left)) < 80 && Math.abs(ny - parseFloat(btn.style.top)) < 80);
      btn.style.left = nx + 'px';
      btn.style.top = ny + 'px';
    });
  }

  function step2() {
    render(`
      <span class="dr-heart">📅</span>
      <h1 class="dr-title">Choisis une date pour notre diner en amoureux 🥺</h1>
      <p class="dr-sub">Quand es-tu disponible ?</p>
      <input type="date" id="drDate">
      <button class="dr-confirm-btn" id="drDateBtn">Continuer ❤️</button>
    `);
    document.getElementById('drDateBtn').onclick = function() {
      const val = document.getElementById('drDate').value;
      if (!val) { alert('Choisis une date 🥺'); return; }
      selectedDate = val;
      step3();
    };
  }

  function step3() {
    const dateStr = new Date(selectedDate + 'T12:00:00').toLocaleDateString('fr-FR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    render(`
      <h1 class="dr-title">Parfait mon ange 💕</h1>
      <div class="dr-badge">${dateStr}</div>
      <p class="dr-sub">Que veux-tu pour ton anniversaire ?</p>
      <div class="dr-cards-wrap" id="drCardsWrap"></div>
    `);

    const wrap = document.getElementById('drCardsWrap');
    const isMobile = window.innerWidth < 480;
    const cardW = isMobile ? Math.floor((wrap.offsetWidth - 40) / 2) : Math.floor((wrap.offsetWidth - 50) / 4);
    const cardH = isMobile ? 100 : 120;
    const gap = 10;
    wrap.style.height = (isMobile ? cardH * 2 + gap * 3 : cardH + gap * 2) + 'px';

    const positions = isMobile
      ? [{ left: gap, top: gap },{ left: cardW + gap*2, top: gap },{ left: gap, top: cardH + gap*2 },{ left: cardW + gap*2, top: cardH + gap*2 }]
      : [{ left: gap, top: gap },{ left: cardW + gap*2, top: gap },{ left: (cardW+gap)*2+gap, top: gap },{ left: (cardW+gap)*3+gap, top: gap }];

    [
     { id: 'dc1', emoji: '&#128536', label: 'Moi', fixed: false },
      { id: 'dc2', emoji: '&#127908', label: 'Un concert de Rilès', fixed: false },
      { id: 'dc3', emoji: '&#128214', label: 'Un livre tout mimi', fixed: false },
      { id: 'dc4', emoji: '&#128523', label: 'Les trois !', fixed: true },

    ].forEach((c, i) => {
      const el = document.createElement('div');
      el.id = c.id;
      el.className = c.fixed ? 'dr-card-fixed' : 'dr-card';
      el.style.cssText = `left:${positions[i].left}px;top:${positions[i].top}px;width:${cardW}px`;
      el.innerHTML = `${c.emoji}<p>${c.label}</p>`;
      wrap.appendChild(el);
      if (!c.fixed) {
        el.addEventListener('mouseenter', function() {
          const maxX = wrap.offsetWidth - cardW - gap;
          const maxY = wrap.offsetHeight - cardH - gap;
          let nx, ny, t = 0;
          do { nx = gap + Math.random()*maxX; ny = gap + Math.random()*maxY; t++; }
          while (t < 20 && Math.abs(nx - parseFloat(el.style.left)) < 40 && Math.abs(ny - parseFloat(el.style.top)) < 40);
          el.style.left = nx + 'px'; el.style.top = ny + 'px';
        });
      } else {
        el.onclick = () => step4('Les trois 🙈');
      }
    });
  }

  function step4(choice) {
    const dateStr = new Date(selectedDate + 'T12:00:00').toLocaleDateString('fr-FR', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    render(`
      <span class="dr-heart">🥰</span>
      <h1 class="dr-title">C'est une date !</h1>
      <div class="dr-badge">${choice} — ${dateStr}</div>
      <p class="dr-sub">Entre ton adresse mail pour recevoir la confirmation 💌</p>
      <input type="email" id="drEmail" placeholder="ton@email.com">
      <button class="dr-confirm-btn" id="drSend">Envoyer ❤️</button>
      <p class="dr-status" id="drSendStatus"></p>
    `);
    document.getElementById('drSend').onclick = function() {
      const email = document.getElementById('drEmail').value.trim();
      const status = document.getElementById('drSendStatus');
      if (!email || !email.includes('@')) { status.textContent = 'Entre une adresse valide.'; return; }
      status.textContent = 'Envoi en cours... 💌';
      document.getElementById('drSend').disabled = true;
      if (typeof emailjs !== 'undefined') {
        emailjs.send("service_mylove", "template_h1cmitq", {
          to_email: email, reply_to: email, date: dateStr, activity: choice
        }).then(() => {
          status.textContent = 'Confirmation envoyée à ' + email + ' !';
        }).catch(() => {
          status.textContent = 'Erreur lors de l\'envoi — vérifie tes clés EmailJS.';
          document.getElementById('drSend').disabled = false;
        });
      } else {
        status.textContent = 'EmailJS non chargé — ajoute le script dans ta page.';
        document.getElementById('drSend').disabled = false;
      }
    };
  }

  step1();
})();
</script>
</html>
